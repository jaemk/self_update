name: Publish to crates.io
on:
  push:
    branches:
      - master
      - main
jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release  # Optional: for enhanced security
    permissions:
      id-token: write     # Required for OIDC token exchange
      contents: write     # Required to push the release tag
    steps:
    - uses: actions/checkout@v6
    - uses: rust-lang/crates-io-auth-action@v1
      id: auth
    - run: cargo publish
      env:
        CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
    - name: Tag the released version
      # Run regardless of the publish result so the tag is created/verified even when
      # `cargo publish` is a no-op (e.g. the version is already on crates.io).
      if: always()
      run: |
        version="$(cargo metadata --format-version 1 --no-deps | jq -r '.packages[0].version')"
        tag="v${version}"
        git fetch --tags --force --quiet
        if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
          echo "Tag ${tag} already exists; nothing to do."
        else
          git tag "${tag}"
          git push origin "${tag}"
          echo "Created and pushed ${tag}."
        fi
